<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Until Dawn — Character Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e; --panel: #111118; --border: #2a2a3a; --accent: #c8102e;
    --text: #d4cfc8; --muted: #6a6570; --high: #c8102e; --med: #e8c840; --low: #4a7fa8;
    --wendigo: #7a3aaa; --wendigo-dim: rgba(122,58,170,0.15); --wendigo-border: rgba(122,58,170,0.5);
    --corrupt: #8a4a1a; --corrupt-dim: rgba(138,74,26,0.15); --corrupt-border: rgba(138,74,26,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Text', serif; font-size: 16px; min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(200,16,46,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 90%, rgba(72,100,168,0.05) 0%, transparent 50%); }

  header { text-align: center; padding: 3rem 1rem 2rem; border-bottom: 1px solid var(--border); position: relative; }
  header::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 120px; height: 2px; background: var(--accent); }
  h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem,5vw,3rem); font-weight: 800; letter-spacing: 0.2em; color: #fff; text-shadow: 0 0 40px rgba(200,16,46,0.4); }
  .subtitle { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.4em; color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; }
  .save-indicator { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); margin-top: 0.8rem; text-transform: uppercase; transition: color 0.3s; }
  .save-indicator.saved { color: #5aaa5a; }
  .save-indicator.saving { color: var(--med); }

  /* ── Chapter Tracker ── */
  .chapter-tracker {
    background: #0d0d14;
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 200;
    backdrop-filter: blur(8px);
    flex-wrap: wrap;
  }
  .chapter-nav {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    padding: 0.4rem 0.9rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    -webkit-appearance: none;
    border-radius: 0;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .chapter-nav:hover { border-color: var(--accent); color: var(--text); }
  .chapter-nav:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .chapter-display { text-align: center; flex: 1; min-width: 180px; }
  .chapter-number { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
  .chapter-title-primary { font-family: 'Cinzel', serif; font-size: clamp(0.9rem, 2.5vw, 1.2rem); font-weight: 600; color: #fff; letter-spacing: 0.1em; line-height: 1.2; }
  .chapter-title-alt { font-family: 'Crimson Text', serif; font-size: 0.8rem; font-style: italic; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.05em; }
  .chapter-time { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--accent); margin-top: 0.3rem; text-transform: uppercase; }
  .chapter-dots { display: flex; gap: 5px; justify-content: center; margin-top: 0.5rem; flex-wrap: wrap; }
  .chapter-dot { width: 7px; height: 7px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; flex-shrink: 0; touch-action: manipulation; }
  .chapter-dot.active { background: var(--accent); border-color: var(--accent); }
  .chapter-dot.past { background: #3a2a2a; border-color: #3a2a2a; }

  /* ── Tabs ── */
  .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; padding: 1.2rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 89px; background: rgba(10,10,14,0.97); backdrop-filter: blur(8px); z-index: 100; }
  .tab-btn { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.15em; padding: 0.5rem 1rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .tab-btn:hover { color: var(--text); border-color: #4a4a5a; }
  .tab-btn.active { border-color: var(--accent); color: #fff; background: rgba(200,16,46,0.1); text-shadow: 0 0 10px rgba(200,16,46,0.4); }
  .tab-btn.is-corrupted { border-color: var(--corrupt-border) !important; color: #c87a3a !important; background: var(--corrupt-dim) !important; }
  .tab-btn.is-wendigo { border-color: var(--wendigo-border) !important; color: #b07ae0 !important; background: var(--wendigo-dim) !important; text-shadow: 0 0 10px rgba(122,58,170,0.5) !important; }

  /* ── Sheets ── */
  .sheet { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .sheet.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .wendigo-view { display: none; }
  .sheet.wendigo-mode .human-view { display: none; }
  .sheet.wendigo-mode .wendigo-view { display: block; }

  .sheet-header { display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .char-name { font-family: 'Cinzel', serif; font-size: clamp(2rem,6vw,3.5rem); font-weight: 800; color: #fff; line-height: 1; }
  .char-role { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-top: 0.4rem; }
  .char-role.wendigo-role { color: var(--wendigo); }

  .status-badge { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; padding: 0.3rem 0.8rem; border: 1px solid #2a5a2a; color: #5aaa5a; text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap; user-select: none; }
  .status-badge.deceased { border-color: #5a2a2a; color: #aa4a4a; }
  .status-badge.unknown  { border-color: #5a4a2a; color: #aa8a4a; }
  .status-badge.wendigo  { border-color: var(--wendigo-border); color: #b07ae0; background: var(--wendigo-dim); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

  .card { background: var(--panel); border: 1px solid var(--border); padding: 1.2rem; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); opacity: 0.6; }
  .card.wendigo-card { border-color: var(--wendigo-border); background: #120e18; }
  .card.wendigo-card::before { background: var(--wendigo); }
  .card.corrupt-card { border-color: var(--corrupt-border); background: #130d08; }
  .card.corrupt-card::before { background: var(--corrupt); }
  .card-title { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.8rem; }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .stat-row:last-child { border-bottom: none; }
  .stat-name { font-size: 0.9rem; color: var(--text); }
  .tier { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em; padding: 0.2rem 0.6rem; text-transform: uppercase; transition: all 0.3s; }
  .tier.high     { color: var(--high); border: 1px solid rgba(200,16,46,0.4);   background: rgba(200,16,46,0.08); }
  .tier.med      { color: var(--med);  border: 1px solid rgba(232,200,64,0.4);  background: rgba(232,200,64,0.08); }
  .tier.low      { color: var(--low);  border: 1px solid rgba(74,127,168,0.4);  background: rgba(74,127,168,0.08); }
  .tier.degraded { color: #6a4a4a;     border: 1px solid rgba(106,74,74,0.4);   background: rgba(106,74,74,0.08); }
  .tier.w-high   { color: #b07ae0;     border: 1px solid rgba(176,122,224,0.4); background: rgba(176,122,224,0.08); }
  .tier.w-med    { color: #8a5ab0;     border: 1px solid rgba(138,90,176,0.4);  background: rgba(138,90,176,0.08); }
  .tier.w-low    { color: #5a3a7a;     border: 1px solid rgba(90,58,122,0.4);   background: rgba(90,58,122,0.08); }

  .pip-track { display: flex; gap: 4px; margin-top: 0.6rem; flex-wrap: wrap; }
  .pip { width: 22px; height: 22px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .pip.filled            { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px rgba(200,16,46,0.5); }
  .pip.filled.hunt       { background: var(--wendigo); border-color: var(--wendigo); box-shadow: 0 0 6px rgba(122,58,170,0.6); }
  .pip.corrupt-pip-filled { background: var(--corrupt); border-color: var(--corrupt); box-shadow: 0 0 6px rgba(138,74,26,0.6); }
  .pip:hover             { border-color: var(--accent); }
  .pip.hunt-pip:hover    { border-color: var(--wendigo); }
  .pip.corrupt-pip:hover { border-color: var(--corrupt); }
  .pip-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }

  .sanity-note { margin-top: 0.6rem; font-size: 0.78rem; font-style: italic; color: var(--muted); min-height: 1.2em; transition: color 0.3s; }
  .sanity-note.warning  { color: var(--med); }
  .sanity-note.critical { color: var(--high); }

  .corrupt-stage-display { margin-top: 0.8rem; padding: 0.5rem 0.8rem; border: 1px solid var(--corrupt-border); background: var(--corrupt-dim); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; transition: all 0.3s; }
  .corrupt-stage-display .stage-name { color: #c87a3a; display: block; margin-bottom: 0.3rem; }
  .corrupt-stage-display .stage-desc { color: var(--muted); font-family: 'Crimson Text', serif; font-size: 0.8rem; letter-spacing: 0; text-transform: none; font-style: italic; }
  .corrupt-stage-display.inactive { border-color: var(--border); background: transparent; }
  .corrupt-stage-display.inactive .stage-name { color: var(--muted); }

  .accel-btn { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.12em; padding: 0.3rem 0.7rem; border: 1px solid var(--corrupt-border); background: transparent; color: #c87a3a; cursor: pointer; text-transform: uppercase; transition: all 0.15s; -webkit-appearance: none; border-radius: 0; touch-action: manipulation; margin-top: 0.8rem; display: block; width: 100%; text-align: center; }
  .accel-btn:active { transform: scale(0.97); background: var(--corrupt-dim); }

  .trait-list { list-style: none; }
  .trait-list li { padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-style: italic; color: var(--text); font-size: 0.95rem; }
  .trait-list li:last-child { border-bottom: none; }
  .trait-list li::before { content: '— '; color: var(--muted); }

  .rel-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 0.5rem; }
  .rel-row:last-child { border-bottom: none; }
  .rel-name { font-size: 0.9rem; color: var(--text); flex-shrink: 0; }
  .rel-select { background: var(--panel); border: 1px solid var(--border); color: var(--muted); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em; padding: 0.2rem 0.4rem; cursor: pointer; text-transform: uppercase; transition: border-color 0.2s, color 0.2s; max-width: 140px; }
  .rel-select option { background: #1a1a24; }
  .rel-select:focus { outline: none; border-color: var(--accent); }
  .rel-select.close     { color: var(--med);  border-color: rgba(232,200,64,0.5); }
  .rel-select.friendly  { color: #6aaa6a;     border-color: rgba(106,170,106,0.5); }
  .rel-select.romantic  { color: #d88ab0;     border-color: rgba(216,138,176,0.5); }
  .rel-select.tense     { color: var(--high); border-color: rgba(200,16,46,0.5); }
  .rel-select.strained  { color: #aa7a3a;     border-color: rgba(170,122,58,0.5); }
  .rel-select.rivals    { color: #c06030;     border-color: rgba(192,96,48,0.5); }
  .rel-select.deceased  { color: var(--muted); }
  .rel-select.unknown   { color: #7a7a9a;     border-color: rgba(122,122,154,0.5); }
  .rel-select.hostile   { color: #ff4040;     border-color: rgba(255,64,64,0.5); }
  .rel-select.estranged { color: #887070;     border-color: rgba(136,112,112,0.5); }

  .inv-item { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; gap: 0.5rem; }
  .inv-item:last-child { border-bottom: none; }
  .inv-left { display: flex; align-items: center; gap: 0.6rem; flex: 1; min-width: 0; }
  .inv-dot { width: 8px; height: 8px; flex-shrink: 0; transition: background 0.2s; }
  .inv-dot.found     { background: var(--accent); }
  .inv-dot.not-found { background: var(--muted); }
  .inv-dot.lost      { background: #aa4a4a; }
  .inv-name { transition: color 0.2s, text-decoration 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inv-name.not-found { color: var(--muted); text-decoration: line-through; }
  .inv-name.lost      { color: #aa4a4a; text-decoration: line-through; }
  .inv-controls { display: flex; gap: 4px; flex-shrink: 0; }
  .inv-state-btn { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.08em; padding: 0.25rem 0.45rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; text-transform: uppercase; transition: all 0.15s; white-space: nowrap; -webkit-appearance: none; border-radius: 0; touch-action: manipulation; }
  .inv-state-btn:active { transform: scale(0.96); }
  .inv-state-btn.sel-found     { border-color: rgba(106,170,106,0.6); color: #6aaa6a; background: rgba(106,170,106,0.08); }
  .inv-state-btn.sel-not-found { border-color: rgba(106,101,112,0.6); color: var(--muted); background: rgba(106,101,112,0.08); }
  .inv-state-btn.sel-lost      { border-color: rgba(170,74,74,0.6);   color: #aa4a4a;  background: rgba(170,74,74,0.08); }
  .inv-fixed-label { font-family: 'Cinzel', serif; font-size: 0.5rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; flex-shrink: 0; }

  .choice-row { padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .choice-row:last-child { border-bottom: none; }
  .choice-label { color: var(--muted); font-size: 0.7rem; font-family: 'Cinzel', serif; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .choice-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-left: 2px solid var(--accent); color: var(--text); font-family: 'Crimson Text', serif; font-size: 0.95rem; font-style: italic; padding: 0.3rem 0.6rem; transition: border-color 0.2s; -webkit-appearance: none; border-radius: 0; }
  .choice-input:focus { outline: none; border-color: var(--accent); background: rgba(200,16,46,0.05); }
  .choice-input::placeholder { color: var(--muted); }
  .choice-input[readonly] { opacity: 0.7; cursor: default; }

  .w-field { padding: 0.5rem 0; border-bottom: 1px solid rgba(122,58,170,0.15); }
  .w-field:last-child { border-bottom: none; }
  .w-sublabel { color: #8a6aaa; font-size: 0.7rem; font-family: 'Cinzel', serif; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .w-input { width: 100%; background: rgba(122,58,170,0.05); border: 1px solid rgba(122,58,170,0.3); border-left: 2px solid var(--wendigo); color: var(--text); font-family: 'Crimson Text', serif; font-size: 0.95rem; font-style: italic; padding: 0.3rem 0.6rem; -webkit-appearance: none; border-radius: 0; }
  .w-input:focus { outline: none; border-color: var(--wendigo); background: rgba(122,58,170,0.1); }
  .w-input::placeholder { color: #5a4a6a; }

  .stage-row { display: flex; gap: 0.5rem; margin-top: 0.3rem; flex-wrap: wrap; }
  .stage-btn { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em; padding: 0.3rem 0.7rem; border: 1px solid rgba(122,58,170,0.3); background: transparent; color: #6a4a8a; cursor: pointer; text-transform: uppercase; transition: all 0.15s; -webkit-appearance: none; border-radius: 0; touch-action: manipulation; }
  .stage-btn:active { transform: scale(0.96); }
  .stage-btn.active { border-color: var(--wendigo); color: #b07ae0; background: var(--wendigo-dim); }

  .memory-row { display: flex; gap: 0.5rem; margin-top: 0.3rem; }
  .mem-btn { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em; padding: 0.3rem 0.7rem; border: 1px solid rgba(122,58,170,0.3); background: transparent; color: #6a4a8a; cursor: pointer; text-transform: uppercase; transition: all 0.15s; flex: 1; text-align: center; -webkit-appearance: none; border-radius: 0; touch-action: manipulation; }
  .mem-btn:active { transform: scale(0.96); }
  .mem-btn.active { border-color: var(--wendigo); color: #b07ae0; background: var(--wendigo-dim); }

  .wendigo-note { font-style: italic; font-size: 0.85rem; color: #6a4a8a; text-align: center; padding: 1.5rem; border: 1px solid rgba(122,58,170,0.2); margin-bottom: 1.5rem; background: rgba(122,58,170,0.04); }

  .section-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.4em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-label.w-label-section { color: #6a4a8a; }
  .section-label.w-label-section::after { background: rgba(122,58,170,0.3); }
  .section-label.c-label-section { color: #8a5a2a; }
  .section-label.c-label-section::after { background: rgba(138,74,26,0.3); }

  .reset-btn { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.15em; padding: 0.3rem 0.8rem; border: 1px solid #3a2a2a; background: transparent; color: #6a4a4a; cursor: pointer; text-transform: uppercase; transition: all 0.2s; -webkit-appearance: none; border-radius: 0; touch-action: manipulation; }
  .reset-btn:hover { border-color: #aa4a4a; color: #aa4a4a; }
</style>
</head>
<body>

<header>
  <h1>UNTIL DAWN</h1>
  <div class="subtitle">Character Dossiers — Blackwood Mountain</div>
  <div class="save-indicator" id="save-indicator">All changes saved locally</div>
</header>

<!-- Chapter Tracker -->
<div class="chapter-tracker">
  <button class="chapter-nav" id="chap-prev" onclick="changeChapter(-1)">&#8592; Prev</button>
  <div class="chapter-display">
    <div class="chapter-number" id="chap-number">Prologue</div>
    <div class="chapter-title-primary" id="chap-primary">Earlier</div>
    <div class="chapter-title-alt" id="chap-alt"></div>
    <div class="chapter-time" id="chap-time">11:00 PM</div>
    <div class="chapter-dots" id="chap-dots"></div>
  </div>
  <button class="chapter-nav" id="chap-next" onclick="changeChapter(1)">Next &#8594;</button>
</div>

<div class="tabs" id="tabs"></div>
<div id="sheets"></div>

<script>
// ── Chapter Data ─────────────────────────────────────────────────
const CHAPTERS = [
  { label: "Prologue",    primary: "Earlier",                  alt: "",                    time: "11:00 PM" },
  { label: "Chapter 1",  primary: "Friendship",               alt: "Memento Mori",        time: "Midnight"  },
  { label: "Chapter 2",  primary: "Darkness",                 alt: "Jealousy",            time: "1:00 AM"   },
  { label: "Chapter 3",  primary: "Isolation",                alt: "Haunted",             time: "2:00 AM"   },
  { label: "Chapter 4",  primary: "Loyalty",                  alt: "Malevolence",         time: "3:00 AM"   },
  { label: "Chapter 5",  primary: "Dread",                    alt: "Prey",                time: "3:12 AM"   },
  { label: "Chapter 6",  primary: "Psychosis",                alt: "Vengeance",           time: "4:00 AM"   },
  { label: "Chapter 7",  primary: "Loss",                     alt: "Violence",            time: "4:30 AM"   },
  { label: "Chapter 8",  primary: "Animus",                   alt: "Revelation",          time: "5:00 AM"   },
  { label: "Chapter 9",  primary: "Despair",                  alt: "Karma",               time: "6:00 AM"   },
  { label: "Chapter 10", primary: "Repentance",               alt: "Resolution",          time: "6:30 AM"   },
];

const REL_OPTIONS   = ["Friendly","Close","Romantic","Tense","Strained","Rivals","Deceased","Unknown","Estranged","Hostile"];
const INV_STATES    = ["found","not-found","lost"];
const INV_LABELS    = { found:"Found", "not-found":"Not Found", lost:"Lost" };
const STATUS_CYCLE  = ["alive","deceased","unknown","wendigo"];
const STATUS_LABELS = { alive:"Alive", deceased:"Deceased", unknown:"Unknown", wendigo:"Wendigo" };

const CORRUPT_STAGES = [
  { name:"Clean",    range:[0,0], desc:"No exposure. Unaffected." },
  { name:"Consumed", range:[1,2], desc:"Ate to survive. Sanity shattered. Secretive and ashamed." },
  { name:"Craving",  range:[3,4], desc:"Intrusive thoughts. Pulling away. Behavioral drift." },
  { name:"Instinct", range:[5,6], desc:"Killing small animals. Blackouts. Flashes of violence." },
  { name:"Turning",  range:[7,7], desc:"No stopping it now. The human is almost gone." },
];

function getCorruptStage(val) {
  return CORRUPT_STAGES.find(s => val >= s.range[0] && val <= s.range[1]) || CORRUPT_STAGES[0];
}

function getDegradedTier(statName, baseTier, sanity) {
  const mental = ["Wit","Composure","Empathy"];
  if (!mental.includes(statName)) return baseTier;
  const tiers = ["low","med","high"];
  const baseIdx = tiers.indexOf(baseTier);
  let drop = 0;
  if (sanity <= 7 && statName === "Wit")       drop = 1;
  if (sanity <= 6 && statName === "Composure") drop = 1;
  if (sanity <= 4) { if (["Wit","Composure"].includes(statName)) drop = 2; if (statName === "Empathy") drop = 1; }
  if (sanity <= 2) drop = Math.max(drop, baseIdx);
  const newIdx = Math.max(0, baseIdx - drop);
  return newIdx === baseIdx ? baseTier : (newIdx === 0 ? "degraded" : tiers[newIdx]);
}

function sanityNote(sanity) {
  if (sanity >= 8) return { text:"", cls:"" };
  if (sanity >= 6) return { text:"Mental strain setting in. Wit beginning to slip.", cls:"warning" };
  if (sanity >= 4) return { text:"Composure fracturing. Rational thought compromised.", cls:"warning" };
  if (sanity >= 2) return { text:"Critical state. Empathy fading. Survival instinct dominant.", cls:"critical" };
  return { text:"Complete psychological collapse.", cls:"critical" };
}

// ── Storage ──────────────────────────────────────────────────────
function buildDefaultState() {
  const s = { chapter: 0 };
  characters.forEach(c => {
    s[c.id] = {
      status:"alive", sanity:c.sanity, hunt:5, stage:0, memory:0,
      location:"", prey1:"", prey2:"", preyNotes:"",
      corruption:0,
      relationships: c.relationships.map(r => r.status),
      inventory: c.inventory.map(i => i.state),
      choices: c.choices.map(ch => ch.val),
    };
  });
  return s;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      const def = buildDefaultState();
      if (parsed.chapter === undefined) parsed.chapter = 0;
      characters.forEach(c => {
        if (!parsed[c.id]) parsed[c.id] = def[c.id];
        if (parsed[c.id].corruption === undefined) parsed[c.id].corruption = 0;
      });
      return parsed;
    }
  } catch(e) {}
  return buildDefaultState();
}

let saveTimer = null;
function markSave() {
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.textContent = 'Saving…'; ind.className = 'save-indicator saving'; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
      if (ind) { ind.textContent = 'All changes saved locally'; ind.className = 'save-indicator saved'; }
    } catch(e) { if (ind) { ind.textContent = 'Storage unavailable'; ind.className = 'save-indicator'; } }
  }, 400);
}

const appState = loadState();

// ── Chapter ──────────────────────────────────────────────────────
function changeChapter(dir) {
  appState.chapter = Math.max(0, Math.min(CHAPTERS.length - 1, appState.chapter + dir));
  renderChapter();
  markSave();
}

function goToChapter(idx) {
  appState.chapter = idx;
  renderChapter();
  markSave();
}

function renderChapter() {
  const ch = CHAPTERS[appState.chapter];
  document.getElementById('chap-number').textContent   = ch.label;
  document.getElementById('chap-primary').textContent  = ch.primary;
  document.getElementById('chap-alt').textContent      = ch.alt ? '— ' + ch.alt + ' —' : '';
  document.getElementById('chap-time').textContent     = ch.time;
  document.getElementById('chap-prev').disabled = appState.chapter === 0;
  document.getElementById('chap-next').disabled = appState.chapter === CHAPTERS.length - 1;
  // dots
  document.querySelectorAll('.chapter-dot').forEach((d, i) => {
    d.className = 'chapter-dot' + (i === appState.chapter ? ' active' : (i < appState.chapter ? ' past' : ''));
  });
}

// Build dots
const dotsEl = document.getElementById('chap-dots');
CHAPTERS.forEach((ch, i) => {
  const d = document.createElement('div');
  d.className = 'chapter-dot' + (i === appState.chapter ? ' active' : (i < appState.chapter ? ' past' : ''));
  d.title = ch.label + ': ' + ch.primary;
  d.addEventListener('click', () => goToChapter(i));
  dotsEl.appendChild(d);
});
renderChapter();

// ── Character Handlers ───────────────────────────────────────────
function cycleStatus(id) {
  appState[id].status = STATUS_CYCLE[(STATUS_CYCLE.indexOf(appState[id].status) + 1) % STATUS_CYCLE.length];
  applyStatus(id); markSave();
}

function applyStatus(id) {
  const s = appState[id];
  const char = characters.find(c => c.id === id);
  document.getElementById('badge-' + id).textContent = STATUS_LABELS[s.status];
  document.getElementById('badge-' + id).className = 'status-badge' + (s.status !== 'alive' ? ' ' + s.status : '');
  const sheet = document.getElementById('sheet-' + id);
  const tab   = document.getElementById('tab-'   + id);
  const role  = document.getElementById('role-'  + id);
  if (s.status === 'wendigo') {
    sheet.classList.add('wendigo-mode'); tab.classList.add('is-wendigo'); tab.classList.remove('is-corrupted');
    role.textContent = 'Wendigo'; role.className = 'char-role wendigo-role';
  } else {
    sheet.classList.remove('wendigo-mode'); tab.classList.remove('is-wendigo');
    role.textContent = char.role; role.className = 'char-role';
    updateCorruptTab(id);
  }
}

function togglePip(id, idx, isHunt) {
  const s = appState[id];
  const key = isHunt ? 'hunt' : 'sanity';
  s[key] = (idx === s[key] - 1) ? s[key] - 1 : idx + 1;
  document.querySelectorAll('#' + (isHunt ? 'hunt-' : 'sanity-') + id + ' .pip').forEach((p, i) => {
    p.classList.toggle('filled', i < s[key]);
    if (isHunt) p.classList.add('hunt');
  });
  if (!isHunt) updateStatDisplay(id);
  markSave();
}

function updateStatDisplay(id) {
  const s = appState[id];
  const char = characters.find(c => c.id === id);
  char.stats.forEach((st, i) => {
    const el = document.getElementById('stat-tier-' + id + '-' + i);
    if (!el) return;
    const tier = getDegradedTier(st.name, st.tier, s.sanity);
    el.textContent = ({high:'High',med:'Medium',low:'Low',degraded:'Impaired'})[tier] || tier;
    el.className = 'tier ' + tier;
  });
  const noteEl = document.getElementById('sanity-note-' + id);
  if (noteEl) { const n = sanityNote(s.sanity); noteEl.textContent = n.text; noteEl.className = 'sanity-note ' + n.cls; }
}

function tickCorruption(id, amount) {
  appState[id].corruption = Math.min(MAX_CORRUPT, appState[id].corruption + amount);
  renderCorruption(id); markSave();
}

function setCorruptPip(id, idx) {
  const s = appState[id];
  s.corruption = (idx === s.corruption - 1) ? s.corruption - 1 : idx + 1;
  renderCorruption(id); markSave();
}

function renderCorruption(id) {
  const s = appState[id];
  const stage = getCorruptStage(s.corruption);
  document.querySelectorAll('#corrupt-track-' + id + ' .pip').forEach((p, i) => {
    p.classList.remove('filled');
    p.classList.toggle('corrupt-pip-filled', i < s.corruption);
  });
  const stageEl = document.getElementById('corrupt-stage-' + id);
  if (stageEl) {
    stageEl.className = 'corrupt-stage-display' + (s.corruption === 0 ? ' inactive' : '');
    stageEl.querySelector('.stage-name').textContent = stage.name;
    stageEl.querySelector('.stage-desc').textContent = stage.desc;
  }
  updateCorruptTab(id);
}

function updateCorruptTab(id) {
  const s = appState[id];
  const tab = document.getElementById('tab-' + id);
  if (!tab) return;
  if (s.status !== 'wendigo' && s.corruption > 0) tab.classList.add('is-corrupted');
  else tab.classList.remove('is-corrupted');
}

function setInvState(id, idx, newState) {
  appState[id].inventory[idx] = newState;
  const dot  = document.getElementById('invdot-'  + id + '-' + idx);
  const name = document.getElementById('invname-' + id + '-' + idx);
  if (dot)  dot.className  = 'inv-dot '  + newState;
  if (name) name.className = 'inv-name ' + (newState !== 'found' ? newState : '');
  INV_STATES.forEach(state => {
    const btn = document.getElementById('invbtn-' + id + '-' + idx + '-' + state);
    if (btn) btn.className = 'inv-state-btn' + (state === newState ? ' sel-' + state : '');
  });
  markSave();
}

function updateRel(id, idx, val) {
  const key = val.toLowerCase().replace(' ','-');
  appState[id].relationships[idx] = key;
  const sel = document.getElementById('rel-' + id + '-' + idx);
  if (sel) sel.className = 'rel-select ' + key;
  markSave();
}

function updateChoice(id, idx, val) { appState[id].choices[idx] = val; markSave(); }
function setStage(id, idx)  { appState[id].stage  = idx; document.querySelectorAll('#stages-' + id + ' .stage-btn').forEach((b,i) => b.classList.toggle('active', i===idx)); markSave(); }
function setMemory(id, idx) { appState[id].memory = idx; document.querySelectorAll('#memory-' + id + ' .mem-btn').forEach((b,i) => b.classList.toggle('active', i===idx)); markSave(); }
function updateWField(id, field, val) { appState[id][field] = val; markSave(); }

function resetCharacter(id) {
  if (!confirm('Reset ' + id.charAt(0).toUpperCase() + id.slice(1) + ' to defaults?')) return;
  Object.assign(appState[id], buildDefaultState()[id]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
  location.reload();
}

  div.id = 'sheet-' + c.id;
  div.innerHTML = `
    <div class="sheet-header">
      <div>
        <div class="char-name">${c.name}</div>
        <div id="role-${c.id}" class="char-role${isWendigo?' wendigo-role':''}">${isWendigo?'Wendigo':c.role}</div>
      </div>
      <div id="badge-${c.id}" class="status-badge${s.status!=='alive'?' '+s.status:''}"
           onclick="cycleStatus('${c.id}')" title="Click to change status">${STATUS_LABELS[s.status]}</div>
    </div>

    <div class="human-view">
      <div class="section-label">Core Stats & Sanity</div>
      <div class="grid-2">
        <div class="card"><div class="card-title">Statistics</div>${statsHTML}</div>
        <div class="card">
          <div class="card-title">Sanity Meter</div>
          <div class="pip-track" id="sanity-${c.id}">${sanityPips}</div>
          <div class="pip-label"><span>Broken</span><span>Stable</span></div>
          <div id="sanity-note-${c.id}" class="sanity-note ${initNote.cls}">${initNote.text}</div>
        </div>
      </div>
      <div class="section-label c-label-section">Corruption</div>
      <div class="card corrupt-card" style="margin-bottom:1.5rem;">
        <div class="card-title">Corruption Meter — 1 pip per in-game hour from exposure</div>
        <div class="pip-track" id="corrupt-track-${c.id}">${corruptPips}</div>
        <div class="pip-label"><span>Clean</span><span>Turning</span></div>
        <div id="corrupt-stage-${c.id}" class="corrupt-stage-display${s.corruption===0?' inactive':''}">
          <span class="stage-name">${corruptStage.name}</span>
          <span class="stage-desc">${corruptStage.desc}</span>
        </div>
        <button class="accel-btn" onclick="tickCorruption('${c.id}',2)">⚡ Second Capture — Advance 2 Hours</button>
      </div>
      <div class="section-label">Personality & Inventory</div>
      <div class="grid-2">
        <div class="card"><div class="card-title">Traits</div><ul class="trait-list">${traitsHTML}</ul></div>
        <div class="card"><div class="card-title">Inventory</div>${invHTML}</div>
      </div>
      <div class="section-label">Relationships</div>
      <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-title">Relationship Status — use dropdown to update</div>${relHTML}
      </div>
      <div class="section-label">Butterfly Effect</div>
      <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-title">Key Choices — type to record outcomes</div>${choicesHTML}
      </div>
      <div style="text-align:right;"><button class="reset-btn" onclick="resetCharacter('${c.id}')">Reset to defaults</button></div>
    </div>

    <div class="wendigo-view">
      <div class="wendigo-note">Human identity subsumed. Wendigo protocols active.</div>
      <div class="section-label w-label-section">Wendigo Stats</div>
      <div class="card wendigo-card" style="margin-bottom:1.5rem;">
        <div class="card-title">Physical & Behavioral</div>${wStatsHTML}
      </div>
      <div class="section-label w-label-section">Hunt Drive & Transformation</div>
      <div class="grid-2">
        <div class="card wendigo-card">
          <div class="card-title">Hunt Drive</div>
          <div class="pip-track" id="hunt-${c.id}">${huntPips}</div>
          <div class="pip-label"><span>Feral</span><span>Controlled</span></div>
          <div style="margin-top:1rem;font-size:0.8rem;color:#5a4a6a;font-style:italic;">Click pips to adjust instinct level.</div>
        </div>
        <div class="card wendigo-card">
          <div class="card-title">Transformation Stage</div>
          <div class="stage-row" id="stages-${c.id}">${stageButtons}</div>
        </div>
      </div>
      <div class="section-label w-label-section">Retained Memory & Location</div>
      <div class="grid-2">
        <div class="card wendigo-card">
          <div class="card-title">Retained Memories</div>
          <div class="memory-row" id="memory-${c.id}">${memButtons}</div>
          <div style="margin-top:0.8rem;font-size:0.8rem;color:#5a4a6a;font-style:italic;">Does the human persist beneath the creature?</div>
        </div>
        <div class="card wendigo-card">
          <div class="card-title">Last Known Location</div>
          <input class="w-input" type="text" placeholder="e.g. Mine tunnels, forest perimeter..."
            value="${s.location||''}" oninput="updateWField('${c.id}','location',this.value)">
        </div>
      </div>
      <div class="section-label w-label-section">Prey Tracked</div>
      <div class="card wendigo-card" style="margin-bottom:1.5rem;">
        <div class="card-title">Active Targets</div>
        <div class="w-field"><div class="w-sublabel">Primary Prey</div>
          <input class="w-input" type="text" placeholder="Name / last seen location..."
            value="${s.prey1||''}" oninput="updateWField('${c.id}','prey1',this.value)"></div>
        <div class="w-field"><div class="w-sublabel">Secondary Prey</div>
          <input class="w-input" type="text" placeholder="Name / last seen location..."
            value="${s.prey2||''}" oninput="updateWField('${c.id}','prey2',this.value)"></div>
        <div class="w-field"><div class="w-sublabel">Notes</div>
          <input class="w-input" type="text" placeholder="Behavioral patterns, triggers..."
            value="${s.preyNotes||''}" oninput="updateWField('${c.id}','preyNotes',this.value)"></div>
      </div>
      <div style="text-align:right;"><button class="reset-btn" onclick="resetCharacter('${c.id}')">Reset to defaults</button></div>
    </div>
  `;
  sheetsEl.appendChild(div);
});
</script>
</body>
</html>
